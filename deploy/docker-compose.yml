version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docsrag_postgres
    environment:
      POSTGRES_USER: docsrag
      POSTGRES_PASSWORD: docsrag
      POSTGRES_DB: docsrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsrag"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: docsrag_api
    environment:
      DATABASE_URL: postgresql://docsrag:docsrag@postgres:5432/docsrag
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ..:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
